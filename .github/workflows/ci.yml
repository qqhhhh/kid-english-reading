name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm run smoke:server-build
      - name: Audit production dependencies
        shell: bash
        run: |
          audit_log=$(mktemp)
          for attempt in 1 2 3; do
            if npm run security:prod 2>&1 | tee "$audit_log"; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 10))
            fi
          done
          if grep -Eqi "audit endpoint returned an error|npm warn audit 5[0-9]{2}|ECONNRESET|ETIMEDOUT" "$audit_log"; then
            echo "::warning title=npm audit unavailable::The npm advisory endpoint stayed unavailable after 3 attempts; local release audit must remain green."
            exit 0
          fi
          exit 1
